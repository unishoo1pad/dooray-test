name: Test Dooray Drive API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 드라이브 API 탐색 (리다이렉트 추적)
        run: |
          echo "=== Drive v1 my drives (follow redirect) ==="
          curl -sL -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: dooray-api ${{ secrets.DOORAY_API_TOKEN }}" \
            "https://dbsec.dooray.com/drive/v1/members/me/drives" | tail -5

          echo ""
          echo "=== Redirect location ==="
          curl -si \
            -H "Authorization: dooray-api ${{ secrets.DOORAY_API_TOKEN }}" \
            "https://dbsec.dooray.com/drive/v1/members/me/drives" 2>&1 | grep -i "location\|HTTP/"
