name: Find Dooray Messenger Channel

on:
  workflow_dispatch:

jobs:
  find:
    runs-on: ubuntu-latest
    steps:
      - name: Get my member info
        run: |
          echo "=== My Member Info ==="
          curl -v -H "Authorization: dooray-api ${{ secrets.DOORAY_API_TOKEN }}" \
            https://dbsec.dooray.com/api/v1/members/me 2>&1 || true

      - name: Get my direct message channels
        run: |
          echo "=== Messenger Channels ==="
          curl -v -H "Authorization: dooray-api ${{ secrets.DOORAY_API_TOKEN }}" \
            "https://dbsec.dooray.com/messenger/v1/channels?type=direct&page=0&size=10" 2>&1 || true

      - name: Check secret exists
        run: |
          if [ -z "${{ secrets.DOORAY_API_TOKEN }}" ]; then
            echo "DOORAY_API_TOKEN secret is EMPTY or NOT SET"
          else
            echo "DOORAY_API_TOKEN is set (length: ${#TOKEN})"
          fi
        env:
          TOKEN: ${{ secrets.DOORAY_API_TOKEN }}
