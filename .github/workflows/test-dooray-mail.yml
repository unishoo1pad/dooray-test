name: Test Dooray Mail

on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Test token with member info API
        run: |
          echo "=== 현재 사용자 정보 ==="
          curl -s -w "\nHTTP: %{http_code}" \
            -H "Authorization: dooray-api ${{ secrets.DOORAY_API_TOKEN }}" \
            https://dbsec.dooray.com/api/v1/members/me

          echo ""
          echo "=== 프로젝트 목록 ==="
          curl -s -w "\nHTTP: %{http_code}" \
            -H "Authorization: dooray-api ${{ secrets.DOORAY_API_TOKEN }}" \
            https://dbsec.dooray.com/project/v1/projects
