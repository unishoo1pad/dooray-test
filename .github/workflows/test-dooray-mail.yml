name: Test Dooray Mail

on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Try mail API endpoints
        run: |
          echo "=== /mail/v1/mailboxes ==="
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: dooray-api ${{ secrets.DOORAY_API_TOKEN }}" \
            https://dbsec.dooray.com/mail/v1/mailboxes

          echo ""
          echo "=== /mail/v1/mails ==="
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: dooray-api ${{ secrets.DOORAY_API_TOKEN }}" \
            https://dbsec.dooray.com/mail/v1/mails

          echo ""
          echo "=== /api/mail/v1/mails ==="
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: dooray-api ${{ secrets.DOORAY_API_TOKEN }}" \
            https://dbsec.dooray.com/api/mail/v1/mails

          echo ""
          echo "=== /mail/v1/ (body) ==="
          curl -s \
            -H "Authorization: dooray-api ${{ secrets.DOORAY_API_TOKEN }}" \
            https://dbsec.dooray.com/mail/v1/mailboxes
