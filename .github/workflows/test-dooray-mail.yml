name: Test Dooray Mail

on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Follow redirects on mail endpoints
        run: |
          echo "=== /mail/v1/mailboxes (follow redirect) ==="
          curl -sL -w "\nHTTP: %{http_code}\nURL: %{url_effective}\n" \
            -H "Authorization: dooray-api ${{ secrets.DOORAY_API_TOKEN }}" \
            https://dbsec.dooray.com/mail/v1/mailboxes

          echo ""
          echo "=== /mail/v1/mails (follow redirect) ==="
          curl -sL -w "\nHTTP: %{http_code}\nURL: %{url_effective}\n" \
            -H "Authorization: dooray-api ${{ secrets.DOORAY_API_TOKEN }}" \
            https://dbsec.dooray.com/mail/v1/mails
