name: Test Dooray Mail

on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send test mail via Dooray API
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://dbsec.dooray.com/api/v1/mails" \
            -H "Authorization: dooray-api ${{ secrets.DOORAY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "subject": "두레이 메일 API 테스트",
              "bodyType": "html",
              "body": "<p>안녕하세요! 두레이 메일 API 테스트 메시지입니다.</p>",
              "to": [{"address": "unishoo1@naver.com"}]
            }')
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "HTTP Status: $status"
          echo "Response: $body"
